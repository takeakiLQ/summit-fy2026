<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サミット営業成績ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="./firebase-config.js"></script>
<script type="module" src="./auth-guard.js"></script>
<script src="./data-loader.js"></script>
<script src="./settings-writer.js"></script>
<style>
:root {
  --c-t1: #FFB3B3; --c-t2: #A5D8FF; --c-t3: #B2F2BB; --c-t4: #FFD8A8;
  --c-primary: #2E5C8A; --c-accent: #6A8FB0;
  --c-bg: #F7F9FC; --c-card: #FFFFFF; --c-border: #E2E8F0;
  --c-text: #1F2937; --c-text-sub: #6B7280;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Yu Gothic','Hiragino Sans','Meiryo',sans-serif; background: var(--c-bg); color: var(--c-text); line-height: 1.6; }
.topbar-wrapper { position: sticky; top: 0; z-index: 50; background: var(--c-bg); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
header { background: linear-gradient(135deg,var(--c-primary),var(--c-accent)); color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
header .header-left { flex: 1 1 auto; min-width: 0; }
header .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
header h1 { font-size: 20px; font-weight: 700; }
header .meta { font-size: 12px; opacity: 0.85; margin-top: 2px; }
header .header-right .user-email { font-size: 12px; opacity: 0.9; }
header .header-right button { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 600; }
header .header-right button:hover { background: rgba(255,255,255,0.3); }
nav { background: white; border-bottom: 1px solid var(--c-border); padding: 0 24px; display: flex; overflow-x: auto; }
nav button { background: none; border: none; padding: 14px 20px; font-size: 14px; font-weight: 600; color: var(--c-text-sub); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
nav button.active { color: var(--c-primary); border-bottom-color: var(--c-primary); }
nav button:hover { color: var(--c-primary); }
.filter-bar { background: var(--c-card); border-bottom: 1px solid var(--c-border); padding: 10px 24px; display: flex; flex-direction: column; gap: 8px; }
.filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.filter-row .label { font-size: 12px; font-weight: 700; color: var(--c-text-sub); min-width: 56px; }
.pill { padding: 5px 12px; border: 1px solid var(--c-border); border-radius: 14px; background: white; color: var(--c-text-sub); font-size: 12px; font-weight: 600; cursor: pointer; }
.pill.active { background: var(--c-primary); color: white; border-color: var(--c-primary); }
.pill:hover:not(.active) { background: var(--c-bg); }
.filter-info { font-size: 11px; color: var(--c-text-sub); margin-left: auto; }
main { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }
.section { display: none; }
.section.active { display: block; }
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 20px; }
.kpi-box { background: var(--c-card); border-radius: 12px; padding: 14px 18px; border: 1px solid var(--c-border); }
.kpi-box .label { font-size: 11px; color: var(--c-text-sub); margin-bottom: 2px; }
.kpi-box .value { font-size: 22px; font-weight: 700; color: var(--c-primary); }
.kpi-box .value small { font-size: 13px; color: var(--c-text-sub); margin-left: 3px; }
h2 { font-size: 15px; font-weight: 700; color: var(--c-primary); margin: 18px 0 10px; padding-bottom: 4px; border-bottom: 2px solid var(--c-border); }
.team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
.team-card { border-radius: 14px; padding: 16px 18px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; position: relative; overflow: hidden; border: 1px solid var(--c-border); background: white; }
.team-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.team-card .accent { position: absolute; top: 0; left: 0; width: 100%; height: 5px; }
.team-card[data-team="T1"] .accent { background: var(--c-t1); }
.team-card[data-team="T2"] .accent { background: var(--c-t2); }
.team-card[data-team="T3"] .accent { background: var(--c-t3); }
.team-card[data-team="T4"] .accent { background: var(--c-t4); }
.team-card .rank { font-size: 10px; color: var(--c-text-sub); font-weight: 600; margin-top: 2px; }
.team-card .name { font-size: 20px; font-weight: 700; margin-top: 2px; }
.team-card .pt { font-size: 28px; font-weight: 700; color: var(--c-primary); margin: 6px 0 2px; }
.team-card .pt small { font-size: 12px; color: var(--c-text-sub); margin-left: 2px; }
.team-card .stats { display: flex; gap: 12px; font-size: 11px; color: var(--c-text-sub); margin-top: 6px; flex-wrap: wrap; }
.team-card .money { font-size: 13px; color: var(--c-text); font-weight: 600; margin-top: 6px; }
.team-card .money small { font-size: 10px; color: var(--c-text-sub); font-weight: 400; }
.chart-card { background: var(--c-card); border-radius: 12px; padding: 16px; margin-bottom: 18px; border: 1px solid var(--c-border); }
.chart-card .title { font-size: 13px; font-weight: 700; color: var(--c-primary); margin-bottom: 10px; }
.chart-wrap { position: relative; height: 260px; }
table.ranking { width: 100%; border-collapse: collapse; background: var(--c-card); border-radius: 10px; overflow: hidden; border: 1px solid var(--c-border); font-size: 13px; }
table.ranking th, table.ranking td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--c-border); }
table.ranking th { background: var(--c-bg); font-weight: 700; color: var(--c-text-sub); font-size: 11px; }
table.ranking tr:last-child td { border-bottom: none; }
table.ranking tr.clickable { cursor: pointer; }
table.ranking tr.clickable:hover { background: var(--c-bg); }
table.ranking td.num { text-align: right; font-variant-numeric: tabular-nums; }
table.ranking th.sortable { cursor: pointer; user-select: none; }
table.ranking th.sortable:hover { background: var(--c-border); }
table.ranking th .sort-ind { color: var(--c-primary); margin-left: 4px; font-weight: 700; }
.rank-badge { display: inline-block; width: 26px; height: 26px; line-height: 26px; text-align: center; border-radius: 50%; font-weight: 700; font-size: 11px; background: var(--c-bg); color: var(--c-text-sub); }
.rank-badge.gold { background: #FFD700; color: #4D3800; }
.rank-badge.silver { background: #C0C0C0; color: #333; }
.rank-badge.bronze { background: #CD7F32; color: white; }
.team-tag { display: inline-block; padding: 2px 9px; border-radius: 9px; font-size: 10px; font-weight: 700; }
.team-tag[data-team="T1"] { background: var(--c-t1); color: #7A2020; }
.team-tag[data-team="T2"] { background: var(--c-t2); color: #1E4670; }
.team-tag[data-team="T3"] { background: var(--c-t3); color: #1F5A2C; }
.team-tag[data-team="T4"] { background: var(--c-t4); color: #7A4500; }
.back-link { display: inline-block; margin-bottom: 10px; color: var(--c-accent); cursor: pointer; font-size: 12px; font-weight: 600; }
.detail-header { background: var(--c-card); border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; border: 1px solid var(--c-border); display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.detail-header .swatch { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; }
.detail-header .name { font-size: 22px; font-weight: 700; }
.detail-header .stats { color: var(--c-text-sub); font-size: 12px; }
.empty { background: var(--c-card); border: 2px dashed var(--c-border); border-radius: 12px; padding: 40px 20px; text-align: center; color: var(--c-text-sub); }
.btn { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--c-border); background: white; color: var(--c-text-sub); }
.btn:hover { background: var(--c-bg); color: var(--c-primary); }
.btn.primary { background: var(--c-primary); color: white; border-color: var(--c-primary); }
.btn.success { background: #059669; color: white; border-color: #059669; }
.btn-group { display: flex; gap: 6px; }
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
.modal.active { display: flex; }
.modal-body { background: white; border-radius: 12px; max-width: 800px; width: 100%; max-height: calc(100vh - 80px); overflow-y: auto; padding: 24px; position: relative; }
.modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--c-text-sub); }
.modal h3 { color: var(--c-primary); font-size: 18px; font-weight: 700; margin-bottom: 4px; padding-right: 32px; }
.modal .sub-title { font-size: 12px; color: var(--c-text-sub); margin-bottom: 16px; }
.modal table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; margin-bottom: 16px; }
.modal table th, .modal table td { padding: 6px 10px; border-bottom: 1px solid var(--c-border); text-align: left; }
.modal table th { background: var(--c-bg); font-size: 11px; font-weight: 700; }
.modal table td.num { text-align: right; font-variant-numeric: tabular-nums; }
.modal table tr.total { background: var(--c-bg); font-weight: 700; }
.modal .kvtable td:first-child { color: var(--c-text-sub); font-size: 11px; width: 40%; }
</style>
</head>
<body>
<div class="topbar-wrapper">
<header>
  <div class="header-left">
    <h1>🏔 サミット営業成績ダッシュボード</h1>
    <div class="meta" id="meta"></div>
  </div>
  <div class="header-right" id="header-actions"></div>
</header>
<nav>
  <button data-view="overview" class="active">全体</button>
  <button data-view="teams">チーム別</button>
  <button data-view="individuals">個人別</button>
  <button data-view="monthly">月別推移</button>
  <button data-view="financials">実績（売上/粗利）</button>
  <button data-view="import-csv" style="margin-left:auto">📥 実績取込</button>
  <button data-view="settings-admin" id="nav-settings" style="display:none">⚙ 設定</button>
</nav>
<div class="filter-bar">
  <div class="filter-row">
    <span class="label">年度:</span>
    <div id="fy-pills" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>
  <div class="filter-row">
    <span class="label">期間:</span>
    <div id="month-pills" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    <div class="filter-info" id="filter-info"></div>
  </div>
</div>
</div><!-- /.topbar-wrapper -->
<main>
  <section id="overview" class="section active"></section>
  <section id="teams" class="section"></section>
  <section id="individuals" class="section"></section>
  <section id="monthly" class="section"></section>
  <section id="financials" class="section"></section>
  <section id="import-csv" class="section"></section>
  <section id="settings-admin" class="section"></section>
  <section id="team-detail" class="section"></section>
  <section id="individual-detail" class="section"></section>
</main>
<div class="modal" id="modal-deal-detail">
  <div class="modal-body">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="deal-detail-body"></div>
  </div>
</div>
<div class="modal" id="modal-deal-financial">
  <div class="modal-body">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="deal-financial-body"></div>
  </div>
</div>
<script>
let TEAM_INFO = { T1:{name:'富士',color:'#FFB3B3'}, T2:{name:'立山',color:'#A5D8FF'}, T3:{name:'剱',color:'#B2F2BB'}, T4:{name:'白山',color:'#FFD8A8'} };
let TEAM_IDS = ['T1','T2','T3','T4'];
function rebuildTeamInfo() {
  const teams = window.__TEAMS__;
  if (!teams || teams.length === 0) return;
  const info = {}, ids = [];
  for (const t of teams) {
    info[t.id] = { name: t.name || t.id, color: t.color || '#cccccc' };
    ids.push(t.id);
  }
  TEAM_INFO = info; TEAM_IDS = ids;
}

let currentFY = 'all', currentMonth = 'all', currentView = 'overview';
let currentMember = null, currentTeam = null;
let currentTeamRankBy = 'point';  // 'point' | 'gp' (粗利)
let SUMMARY = null, DEALS = null, FINANCIALS = null;
let isInitialized = false;

function getCurrentFY() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  return 'FY' + (m >= 4 ? y : y - 1);
}

function initAfterDataReady() {
  SUMMARY = window.__SUMMARY__;
  DEALS = window.__DEALS__;
  FINANCIALS = window.__FINANCIALS__;
  if (!SUMMARY) {
    document.querySelector('main').innerHTML = '<div class="empty"><h2>データが読み込めません</h2></div>';
    return;
  }
  rebuildTeamInfo();
  document.getElementById('meta').textContent = buildMetaLine();
  if (window.__USER_ROLE__ === 'admin') {
    const navSettings = document.getElementById('nav-settings');
    if (navSettings) navSettings.style.display = '';
  }
  injectRefreshButton();
  injectUserInfo();
  if (!isInitialized) {
    const todayFY = getCurrentFY();
    if (SUMMARY.aggregateByFiscalYear && SUMMARY.aggregateByFiscalYear[todayFY]) {
      currentFY = todayFY;
    }
    currentMonth = 'all';
    currentView = 'overview';
    isInitialized = true;
    renderFyPills(); renderMonthPills(); updateFilterInfo(); renderOverview();
  } else {
    renderFyPills(); renderMonthPills(); updateFilterInfo(); renderCurrentView();
  }
}
if (window.__SUMMARY__) {
  initAfterDataReady();
} else {
  window.addEventListener('summit-data-ready', initAfterDataReady);
}

function fyMonths(fy) {
  if (!fy.startsWith('FY')) return [];
  const y = Number(fy.slice(2));
  const a = [];
  for (let m=4;m<=12;m++) a.push(y + '-' + String(m).padStart(2,'0'));
  for (let m=1;m<=3;m++) a.push((y+1) + '-' + String(m).padStart(2,'0'));
  return a;
}
function ymInFY(ym, fy) { return ym && fy.startsWith('FY') && fyMonths(fy).includes(ym); }

function getAggregate() {
  if (currentMonth !== 'all') return (SUMMARY.aggregateByPeriod && SUMMARY.aggregateByPeriod[currentMonth]) || emptyAgg();
  if (currentFY !== 'all') return (SUMMARY.aggregateByFiscalYear && SUMMARY.aggregateByFiscalYear[currentFY]) || emptyAgg();
  return SUMMARY.aggregate;
}
function emptyAgg() { return { totalPoint:0, totalDeals:0, totalIssues:0, members:[], teams:[], monthly:[], rankings:{individual:[],team:[]} }; }

function yearMonthToFY(ym) {
  if (!ym || !/^\d{4}-\d{2}$/.test(ym)) return null;
  const y = Number(ym.slice(0,4)), mo = Number(ym.slice(5,7));
  return 'FY' + (mo >= 4 ? y : y - 1);
}

function getFinancialsForPeriod() {
  const empty = { revenue:0, grossProfit:0, byTeam:{}, byMember:{}, byMonth:{}, matchedRows:[] };
  if (!SUMMARY) return empty;
  if (currentMonth !== 'all') {
    const f = (SUMMARY.financialsByPeriod || {})[currentMonth];
    if (!f) return empty;
    const byTeam = {};
    for (const [tid, v] of Object.entries(f.byTeam || {})) byTeam[tid] = { revenue: v.revenue, grossProfit: v.grossProfit, deals: v.dealCount };
    return { revenue: f.revenue, grossProfit: f.grossProfit, byTeam, byMember: {}, byMonth: {}, matchedRows: [] };
  }
  if (currentFY !== 'all') {
    const f = (SUMMARY.financialsByFiscalYear || {})[currentFY];
    if (!f) return empty;
    const byTeam = {};
    for (const [tid, v] of Object.entries(f.byTeam || {})) byTeam[tid] = { revenue: v.revenue, grossProfit: v.grossProfit, deals: v.dealCount };
    return { revenue: f.revenue, grossProfit: f.grossProfit, byTeam, byMember: {}, byMonth: {}, matchedRows: [] };
  }
  const f = SUMMARY.financials;
  if (!f) return empty;
  const byTeam = {};
  for (const [tid, v] of Object.entries(f.byTeam || {})) byTeam[tid] = { revenue: v.revenue, grossProfit: v.grossProfit, deals: v.dealCount };
  return { revenue: f.revenue, grossProfit: f.grossProfit, byTeam, byMember: f.byMember || {}, byMonth: f.byMonth || {}, matchedRows: [] };
}

function fmtPt(n) { return (Math.round(n*100)/100).toFixed(2); }
function fmtYen(n) { return '¥' + Math.round(n).toLocaleString(); }
function rankBadge(r) { const c=r===1?'gold':r===2?'silver':r===3?'bronze':''; return '<span class="rank-badge '+c+'">'+r+'</span>'; }
function teamTag(t) { const i=TEAM_INFO[t]||{name:t}; return '<span class="team-tag" data-team="'+t+'">'+t+' '+i.name+'</span>'; }
function escHtml(s) { return String(s ?? '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

function renderFyPills() {
  const c = document.getElementById('fy-pills');
  const fys = ['all'];
  if (SUMMARY.aggregateByFiscalYear) for (const fy of Object.keys(SUMMARY.aggregateByFiscalYear).sort()) fys.push(fy);
  c.innerHTML = '';
  for (const fy of fys) {
    const b = document.createElement('button');
    b.className = 'pill' + (fy===currentFY?' active':'');
    b.textContent = fy==='all' ? '全期間' : fy;
    b.onclick = () => { currentFY = fy; currentMonth = 'all'; renderFyPills(); renderMonthPills(); updateFilterInfo(); renderCurrentView(); };
    c.appendChild(b);
  }
}
function renderMonthPills() {
  const c = document.getElementById('month-pills');
  c.innerHTML = '';
  let ms = ['all'];
  if (currentFY === 'all') {
    if (SUMMARY.aggregateByPeriod) for (const ym of Object.keys(SUMMARY.aggregateByPeriod).sort()) ms.push(ym);
  } else {
    for (const ym of fyMonths(currentFY)) if (SUMMARY.aggregateByPeriod && SUMMARY.aggregateByPeriod[ym]) ms.push(ym);
  }
  for (const m of ms) {
    const b = document.createElement('button');
    b.className = 'pill' + (m===currentMonth?' active':'');
    b.textContent = m==='all' ? '累積' : m;
    b.onclick = () => { currentMonth = m; renderMonthPills(); updateFilterInfo(); renderCurrentView(); };
    c.appendChild(b);
  }
}
function updateFilterInfo() {
  const a = getAggregate(); const fin = getFinancialsForPeriod();
  const label = currentMonth !== 'all' ? currentMonth+'単月' : currentFY !== 'all' ? currentFY+'累積' : '全期間累積';
  document.getElementById('filter-info').textContent = '表示中: ' + label + ' / 案件 ' + a.totalDeals + '件 / ' + fmtPt(a.totalPoint) + 'pt' + (fin.revenue > 0 ? ' / 売上 ' + fmtYen(fin.revenue) : '');
}

function renderCurrentView() {
  const active = document.querySelector('.section.active');
  if (active) {
    if (active.id === 'individual-detail' && currentMember) { showIndividualDetail(currentMember); return; }
    if (active.id === 'team-detail' && currentTeam) { showTeamDetail(currentTeam); return; }
  }
  ({overview:renderOverview, teams:renderTeams, individuals:renderIndividuals, monthly:renderMonthly, financials:renderFinancials, 'import-csv':renderImportCsv, 'settings-admin':renderSettingsAdmin}[currentView] || (()=>{}))();
}

function parseCsvLine(line) {
  const out = []; let cur = ''; let q = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (q) { if (c === '"') { if (line[i+1] === '"') { cur += '"'; i++; } else { q = false; } } else cur += c; }
    else { if (c === ',') { out.push(cur); cur = ''; } else if (c === '"') q = true; else cur += c; }
  }
  out.push(cur); return out;
}

// ペンディング変更（セッション内で保留）。 { team_<id>_<field>: value, member_<email>_<field>: value }
const pendingChanges = { teams: {}, members: {} };
function pendingCount() {
  let n = 0;
  for (const t of Object.values(pendingChanges.teams)) n += Object.keys(t).length;
  for (const m of Object.values(pendingChanges.members)) n += Object.keys(m).length;
  return n;
}
// タブ離脱・リロード時の未保存警告
window.addEventListener('beforeunload', e => {
  if (pendingCount() > 0) { e.preventDefault(); e.returnValue = ''; }
});

function renderSettingsAdmin() {
  const sec = document.getElementById('settings-admin');
  if (window.__USER_ROLE__ !== 'admin') { sec.innerHTML = '<div class="empty"><h2>⛔ 権限がありません</h2></div>'; return; }
  const teams = (window.__TEAMS_ALL__ || []).slice().sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  const members = (window.__MEMBERS_ALL__ || []).slice().sort((a,b)=>(a.team||'').localeCompare(b.team||'')||(a.name||'').localeCompare(b.name||''));
  const pcount = pendingCount();
  let html = '<h2>⚙ 設定（管理者用）</h2>';
  // 未保存バナー
  if (pcount > 0) {
    html += '<div id="pending-bar" style="background:#fef3c7;border:1px solid #f59e0b;border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">';
    html += '<span style="font-size:13px;color:#92400e;font-weight:700">📝 未保存の変更が '+pcount+' 件あります</span>';
    html += '<button class="btn primary" data-action="save-all">💾 まとめて保存</button>';
    html += '<button class="btn" data-action="discard-all">破棄</button>';
    html += '</div>';
  }
  html += '<p style="font-size:12px;color:var(--c-text-sub);margin-bottom:16px">編集は複数行をまとめて変更し、上の「💾 まとめて保存」で一括反映されます。「非表示」「追加」は即時実行です。</p>';

  // 同期管理セクション
  html += '<div style="background:white;border:1px solid var(--c-border);border-radius:12px;padding:20px;margin-bottom:20px">';

function attachSettingsHandlers(sec) {
  // 編集はchangeでpendingに保留
  sec.querySelectorAll('[data-team-id][data-field]').forEach(inp => {
    inp.addEventListener('change', () => {
      const id = inp.dataset.teamId;
      const f = inp.dataset.field;
      const orig = (window.__TEAMS_ALL__ || []).find(x => x.id === id) || {};
      const val = f === 'sortOrder' ? Number(inp.value) || 0 : inp.value;
      const origVal = orig[f];
      if (!pendingChanges.teams[id]) pendingChanges.teams[id] = {};
      if (val === origVal) delete pendingChanges.teams[id][f];
      else pendingChanges.teams[id][f] = val;
      if (Object.keys(pendingChanges.teams[id]).length === 0) delete pendingChanges.teams[id];
      renderSettingsAdmin();
    });
  });
  sec.querySelectorAll('[data-member-email][data-field]').forEach(inp => {
    inp.addEventListener('change', () => {
      const email = inp.dataset.memberEmail;
      const f = inp.dataset.field;
      const orig = (window.__MEMBERS_ALL__ || []).find(x => x.email === email) || {};
      const val = inp.value;
      const origVal = orig[f];
      if (!pendingChanges.members[email]) pendingChanges.members[email] = {};
      if (val === origVal) delete pendingChanges.members[email][f];
      else pendingChanges.members[email][f] = val;
      if (Object.keys(pendingChanges.members[email]).length === 0) delete pendingChanges.members[email];
      renderSettingsAdmin();
    });
  });
  // ボタン
  sec.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action;
      try {
        btn.disabled = true;
        const prev = btn.textContent;
        btn.textContent = '処理中...';
        if (action === 'save-all') await onSaveAll();
        else if (action === 'discard-all') onDiscardAll();
        else if (action === 'toggle-team') await onToggleTeam(btn.dataset.teamId);
        else if (action === 'add-team') await onAddTeam(sec);
        else if (action === 'toggle-member') await onToggleMember(btn.dataset.memberEmail);
        else if (action === 'add-member') await onAddMember(sec);
        else if (action === 'sync-now') { await onSyncNow(); return; } // 再描画不要、ステータス表示で完結
        if (action !== 'discard-all') {
          await reloadTeamsAndMembersOnly();
        }
        renderSettingsAdmin();
      } catch (e) {
        alert('エラー: ' + (e.message || e));
        btn.disabled = false; btn.textContent = '失敗';
      }
    });
  });
}

async function onSaveAll() {
  const teamIds = Object.keys(pendingChanges.teams);
  const memberEmails = Object.keys(pendingChanges.members);
  const errors = [];
  // チーム
  for (const id of teamIds) {
    try {
      await window.__SETTINGS_WRITER__.upsertTeam(id, pendingChanges.teams[id]);
    } catch (e) { errors.push('team ' + id + ': ' + (e.message || e)); }
  }
  // メンバー
  for (const email of memberEmails) {
    try {
      await window.__SETTINGS_WRITER__.upsertMember(email, pendingChanges.members[email]);
    } catch (e) { errors.push('member ' + email + ': ' + (e.message || e)); }
  }
  // クリア
  pendingChanges.teams = {};
  pendingChanges.members = {};
  clearDataCache();
  if (errors.length > 0) alert('一部失敗しました:\n' + errors.join('\n'));
  else alert('✅ ' + (teamIds.length + memberEmails.length) + '件の変更を保存しました');
}
function onDiscardAll() {
  if (!confirm('未保存の変更を全て破棄しますか？')) return;
  pendingChanges.teams = {};
  pendingChanges.members = {};
}

async function onSyncNow() {
  const status = document.getElementById('sync-now-status');
  if (status) status.textContent = '🚀 GitHub Actions を起動中...';
  try {
    const result = await window.__API_SEND__('POST', '/api/admin/sync-now');
    if (status) {
      status.innerHTML = '✅ ' + (result.message || '起動しました') +
        (result.runsUrl ? ' <a href="'+result.runsUrl+'" target="_blank" style="color:var(--c-primary);text-decoration:underline">実行状況を確認</a>' : '');
      status.style.color = '#059669';
    }
  } catch (e) {
    if (status) {
      status.textContent = '❌ 失敗: ' + (e.message || e);
      status.style.color = '#DC2626';
    }
  }
}

function previewCsv() {
  const file = document.getElementById('csv-file').files[0];
  if (!file) { alert('ファイルを選択'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = String(e.target.result).replace(/^﻿/, '');
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
    if (lines.length < 2) { document.getElementById('csv-preview').innerHTML = '<div class="empty">行数不足</div>'; return; }
    const header = parseCsvLine(lines[0]);
    const idx = {
      ym: header.findIndex(h => h.includes('配送年月')),
      mn: header.findIndex(h => h.includes('マニュアル番号')),
      rev: header.findIndex(h => h.includes('売上合計')),
      cp: header.findIndex(h => h.includes('CP用原価合計')),
      wd: header.findIndex(h => h.includes('稼働日数')),
    };
    if (idx.ym < 0 || idx.mn < 0 || idx.rev < 0 || idx.cp < 0) { document.getElementById('csv-preview').innerHTML = '<div class="empty">必須カラムが見つかりません</div>'; return; }
    const months = new Set();
    let totalRev = 0, totalGp = 0, rowCount = 0;
    csvParsedRows = [];
    for (let i = 1; i < lines.length; i++) {
      const c = parseCsvLine(lines[i]);
      const ym = String(c[idx.ym] || '').replace(/['"]/g,'').trim();
      const mn = String(c[idx.mn] || '').replace(/['"]/g,'').trim();
      const rev = Number(c[idx.rev]) || 0;
      const cp = Number(c[idx.cp]) || 0;
      const wd = Number(c[idx.wd]) || 0;
      if (!ym || !mn) continue;
      const ymNorm = /^\d{6}$/.test(ym) ? ym.slice(0,4)+'-'+ym.slice(4,6) : ym;
      months.add(ymNorm); totalRev += rev; totalGp += rev - cp; rowCount++;
      csvParsedRows.push({ yearMonth: ymNorm, manualNo: mn, revenue: rev, grossProfit: rev - cp, workdays: wd });
    }
    const sortedMonths = Array.from(months).sort();
    let html = '<h3 style="margin-bottom:8px">プレビュー</h3>';
    html += '<table class="ranking"><tbody>';
    html += '<tr><td>ファイル名</td><td><strong>'+file.name+'</strong></td></tr>';
    html += '<tr><td>有効行数</td><td>'+rowCount+'</td></tr>';
    html += '<tr><td>対象月</td><td><strong>'+sortedMonths.join(', ')+'</strong></td></tr>';
    html += '<tr><td>合計売上</td><td>'+fmtYen(totalRev)+'</td></tr>';
    html += '<tr><td>合計粗利</td><td>'+fmtYen(totalGp)+'</td></tr>';
    html += '</tbody></table>';
    document.getElementById('csv-preview').innerHTML = html;
    document.getElementById('btn-import').disabled = false;
  };
  reader.readAsText(file, 'UTF-8');
}

async function importCsvToD1() {
  if (!csvParsedRows || csvParsedRows.length === 0) { alert('先にプレビュー'); return; }
  const fileName = document.getElementById('csv-file').files[0]?.name || '(unknown)';
  const progress = document.getElementById('csv-import-progress');
  if (!confirm('対象月のデータを削除して、CSVの内容で置換します。よろしいですか？')) return;
  document.getElementById('btn-import').disabled = true;
  document.getElementById('btn-preview').disabled = true;
  try {
    progress.innerHTML = '<div style="padding:12px;background:var(--c-bg);border-radius:8px;font-size:13px">⏳ 送信中...</div>';
    const months = Array.from(new Set(csvParsedRows.map(r => r.yearMonth))).sort();
    const result = await window.__API_SEND__('POST', '/api/import-csv', { rows: csvParsedRows, months, fileName });
    progress.innerHTML = '<div style="padding:14px;background:#d1fae5;border:1px solid #059669;border-radius:8px;font-size:13px;color:#064e3b">✅ <strong>取込完了！</strong><br>対象月: '+months.join(', ')+'<br>削除: '+(result.deleted||0)+' / 書込: '+(result.upserted||0)+'（突合 '+(result.matched||0)+' / 未突合 '+(result.unmatched||0)+'）<br><button class="btn primary" style="margin-top:10px" onclick="(function(){if(window.__CLEAR_DATA_CACHE__)window.__CLEAR_DATA_CACHE__();location.reload();})()">再読込</button></div>';
    document.getElementById('btn-preview').disabled = false;
  } catch (err) {
    progress.innerHTML = '<div style="padding:14px;background:#fee2e2;border:1px solid #DC2626;border-radius:8px;font-size:13px;color:#7f1d1d">❌ '+(err.message||err)+'</div>';
    document.getElementById('btn-import').disabled = false;
    document.getElementById('btn-preview').disabled = false;
  }
}

const personDealsCache = {};
async function loadPersonDealsCached(ownerName, ownerEmail) {
  const cacheKey = ownerEmail || ownerName;
  if (personDealsCache[cacheKey]) return personDealsCache[cacheKey];
  if (!window.__LOAD_PERSON_DEALS__) return [];
  const deals = await window.__LOAD_PERSON_DEALS__(ownerName, ownerEmail);
  personDealsCache[cacheKey] = deals;
  return deals;
}

// 担当案件リストのソート状態（デフォルト: 稼働開始 昇順）
let personDealsSort = { col: 'operationStartDate', dir: 'asc' };

function sortPersonDeals(deals, sort) {
  const col = sort.col;
  const dir = sort.dir === 'desc' ? -1 : 1;
  const getter = {
    operationStartDate: d => d.operationStartDate || '',
    name: d => d.name || '',
    msKbn: d => d.msKbn === 'main' ? 1 : d.msKbn === 'sub' ? 2 : 9,
    hourlyRate: d => d.hourlyRate ?? -1,
    point: d => d.point ?? 0,
    classification: d => d.classification || '',
    monthlyRevenue: d => d.monthlyRevenue ?? -1,
  }[col] || (d => '');
  return [...deals].sort((a, b) => {
    const va = getter(a), vb = getter(b);
    if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * dir;
    return String(va).localeCompare(String(vb)) * dir;
  });
}

function renderPersonDealsTable(personDeals) {
  const area = document.getElementById('person-deals-area');
  if (!area) return;
  const sorted = sortPersonDeals(personDeals, personDealsSort);
  let html = '<h2>担当案件リスト（'+personDeals.length+'件）</h2>';
  if (sorted.length === 0) {
    html += '<div class="empty">この期間の案件はありません</div>';
    area.innerHTML = html;
    return;
  }
  // ソートインジケータ
  const ind = (c) => personDealsSort.col === c ? '<span class="sort-ind">'+(personDealsSort.dir==='asc'?'▲':'▼')+'</span>' : '';
  html += '<table class="ranking"><thead><tr>';
  html += '<th class="sortable" data-sort-col="operationStartDate">稼働開始'+ind('operationStartDate')+'</th>';
  html += '<th class="sortable" data-sort-col="name">案件名'+ind('name')+'</th>';
  html += '<th class="sortable" data-sort-col="msKbn">M/S'+ind('msKbn')+'</th>';
  html += '<th class="sortable num" data-sort-col="hourlyRate">時単価'+ind('hourlyRate')+'</th>';
  html += '<th class="sortable num" data-sort-col="point">pt'+ind('point')+'</th>';
  html += '<th class="sortable" data-sort-col="classification">区分'+ind('classification')+'</th>';
  html += '<th class="sortable num" data-sort-col="monthlyRevenue">月間予定売上'+ind('monthlyRevenue')+'</th>';
  html += '<th>操作</th></tr></thead><tbody>';
  for (const d of sorted) {
    const msLabel = d.msKbn === 'main' ? 'メイン' : d.msKbn === 'sub' ? 'サブ' : '?';
    html += '<tr>';
    html += '<td>'+(d.operationStartDate?String(d.operationStartDate).slice(0,10):'-')+'</td>';
    html += '<td>'+escHtml(d.name)+'</td><td>'+msLabel+'</td>';
    html += '<td class="num">'+(d.hourlyRate!=null?fmtYen(d.hourlyRate):'-')+'</td>';
    html += '<td class="num"><strong>'+fmtPt(d.point)+'pt</strong></td>';
    html += '<td>'+escHtml(d.classification || '-')+'</td>';
    html += '<td class="num">'+(d.monthlyRevenue!=null?fmtYen(d.monthlyRevenue):'-')+'</td>';
    html += '<td><div class="btn-group">';
    html += '<button class="btn primary" onclick="showDealDetail(\''+d.id+'\')">詳細</button>';
    html += '<button class="btn success" onclick="showDealFinancial(\''+d.id+'\')">実績</button>';
    html += '</div></td></tr>';
  }
  html += '</tbody></table>';
  area.innerHTML = html;
  // ヘッダクリックでソート切替
  area.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sortCol;
      if (personDealsSort.col === col) personDealsSort.dir = personDealsSort.dir === 'asc' ? 'desc' : 'asc';
      else { personDealsSort.col = col; personDealsSort.dir = 'asc'; }
      renderPersonDealsTable(personDeals);
    });
  });
}

function getMemberFinancialsCumulative(ownerName) {
  const mf = (SUMMARY && SUMMARY.memberFinancials) ? SUMMARY.memberFinancials[ownerName] : null;
  if (!mf) return { plan: 0, cumRev: 0, cumGp: 0 };
  if (currentMonth !== 'all') {
    const m = (mf.byMonth || {})[currentMonth];
    return m ? { plan: m.plan, cumRev: m.cumRev, cumGp: m.cumGp } : { plan: 0, cumRev: 0, cumGp: 0 };
  }
  if (currentFY !== 'all') {
    const f = (mf.byFy || {})[currentFY];
    return f ? { plan: f.plan, cumRev: f.cumRev, cumGp: f.cumGp } : { plan: 0, cumRev: 0, cumGp: 0 };
  }
  return { plan: mf.all.plan, cumRev: mf.all.cumRev, cumGp: mf.all.cumGp };
}

function setActiveSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); const el = document.getElementById(id); if (el) el.classList.add('active'); }
function setActiveTab(view) { document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.view === view)); }
function attachClickHandlers(sec) {
  sec.querySelectorAll('[data-team-id]').forEach(el => el.addEventListener('click', () => showTeamDetail(el.dataset.teamId)));
  sec.querySelectorAll('[data-member]').forEach(el => el.addEventListener('click', () => showIndividualDetail(el.dataset.member)));
}
document.querySelectorAll('nav button').forEach(btn => btn.addEventListener('click', () => { currentView = btn.dataset.view; currentMember = null; currentTeam = null; setActiveTab(currentView); setActiveSection(currentView); renderCurrentView(); }));

function injectRefreshButton() {
  const actions = document.getElementById('header-actions');
  if (!actions || document.getElementById('btn-force-refresh')) return;
  const btn = document.createElement('button');
  btn.id = 'btn-force-refresh';
  btn.title = '最新データを再取得';
  btn.textContent = '🔄 最新化';
  btn.addEventListener('click', async () => {
    if (window.__CLEAR_DATA_CACHE__) window.__CLEAR_DATA_CACHE__();
    if (window.__DATA_RELOADER__) await window.__DATA_RELOADER__();
  });
  actions.insertBefore(btn, actions.firstChild);
}

function injectUserInfo() {
  const actions = document.getElementById('header-actions');
  if (!actions) return;
  const oldEmail = document.getElementById('user-info'); if (oldEmail) oldEmail.remove();
  const oldBtn = document.getElementById('btn-logout'); if (oldBtn) oldBtn.remove();
  const span = document.createElement('span');
  span.id = 'user-info';
  span.className = 'user-email';
  span.textContent = window.__USER_EMAIL__ || '';
  actions.appendChild(span);
  const btn = document.createElement('button');
  btn.id = 'btn-logout';
  btn.textContent = 'ログアウト';
  btn.addEventListener('click', () => {
    if (window.__AUTH__ && window.__AUTH__.signOut) window.__AUTH__.signOut(window.__AUTH__.auth);
  });
  actions.appendChild(btn);
}

function buildMetaLine() {
  const parts = [];
  if (SUMMARY.computedAt) parts.push('SFデータ更新日時: ' + new Date(SUMMARY.computedAt).toLocaleString('ja-JP'));
  if (SUMMARY.financialsByPeriod) {
    const yms = Object.keys(SUMMARY.financialsByPeriod).filter(Boolean).sort();
    if (yms.length > 0) parts.push('実績データ: ' + yms[0] + ' 〜 ' + yms[yms.length - 1]);
  }
  return parts.join('  /  ');
}
