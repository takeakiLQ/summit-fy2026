name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pages/**'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: read
  pull-requests: write  # PR にプレビューURLをコメント

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wrangler インストール
        run: npm install -g wrangler

      - name: Cloudflare Pages にデプロイ
        id: deploy
        working-directory: pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # PR ならプレビューブランチ、main push なら production
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="pr-${{ github.event.pull_request.number }}"
          else
            BRANCH="main"
          fi
          echo "Deploying to branch: $BRANCH"
          wrangler pages deploy ./public \
            --project-name=summit-fy2026 \
            --branch="$BRANCH" \
            --commit-dirty=true | tee deploy-output.log
          # デプロイURL を取得して output に
          URL=$(grep -oE 'https://[a-z0-9.-]+\.pages\.dev' deploy-output.log | tail -1)
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT

      - name: PR にプレビューURLをコメント
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deploy_url
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deploy_url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **プレビューデプロイ完了！**\n\nこのPRの内容を確認できます: ${url}\n\nmainにマージすると本番（https://summit-fy2026.pages.dev）に反映されます。`
            });

      - name: デプロイ完了
        if: success()
        run: echo "✅ Cloudflare Pages デプロイ完了 → ${{ steps.deploy.outputs.deploy_url }}"
