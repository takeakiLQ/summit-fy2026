name: Salesforce → Cloudflare D1 自動同期

on:
  schedule:
    # 6時間ごとに実行（UTC基準）。JST 9/15/21/3時。
    - cron: '0 */6 * * *'
  workflow_dispatch:  # GitHub UI から手動実行できるように

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cloudflare から members.json を取得（最新のチーム・メンバー設定をSF SOQL対象に反映）
        env:
          CLOUDFLARE_PAGES_URL: ${{ secrets.CLOUDFLARE_PAGES_URL }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
        run: |
          curl -fsS -H "x-sync-api-key: $SYNC_API_KEY" \
            "$CLOUDFLARE_PAGES_URL/api/sync/members-json" \
            -o sf-extract/config/members.json
          echo "--- members.json (取得確認) ---"
          head -c 500 sf-extract/config/members.json
          echo ""

      - name: sf-extract — Salesforce 認証情報を .env に書き出し
        working-directory: sf-extract
        env:
          SF_AUTH_TYPE: ${{ secrets.SF_AUTH_TYPE }}
          SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_CLIENT_SECRET: ${{ secrets.SF_CLIENT_SECRET }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_SECURITY_TOKEN: ${{ secrets.SF_SECURITY_TOKEN }}
        run: |
          cat <<EOF > .env
          SF_AUTH_TYPE=$SF_AUTH_TYPE
          SF_LOGIN_URL=$SF_LOGIN_URL
          SF_CLIENT_ID=$SF_CLIENT_ID
          SF_CLIENT_SECRET=$SF_CLIENT_SECRET
          SF_USERNAME=$SF_USERNAME
          SF_PASSWORD=$SF_PASSWORD
          SF_SECURITY_TOKEN=$SF_SECURITY_TOKEN
          SF_API_VERSION=v60.0
          OUTPUT_DIR=./output
          EOF

      - name: sf-extract — 依存インストール
        working-directory: sf-extract
        run: npm install --no-audit --no-fund

      - name: sf-extract — Salesforce 案件抽出
        working-directory: sf-extract
        run: npm run extract -- --out output/deals-latest.json

      - name: kpi-compute — 依存インストール
        working-directory: kpi-compute
        run: npm install --no-audit --no-fund

      - name: kpi-compute — KPI計算
        working-directory: kpi-compute
        run: npm run compute -- --in ../sf-extract/output/deals-latest.json --out-base latest

      - name: Cloudflare D1 に案件データを投入（差分削除＋サマリー再計算込み）
        env:
          CLOUDFLARE_PAGES_URL: ${{ secrets.CLOUDFLARE_PAGES_URL }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
        run: |
          node pages/migrations/import-deals.mjs \
            "$CLOUDFLARE_PAGES_URL" "$SYNC_API_KEY" \
            kpi-compute/output/latest_deals.json

      - name: 後片付け（.env を削除）
        if: always()
        run: rm -f sf-extract/.env || true

      - name: 同期完了通知
        if: success()
        run: echo "✅ Salesforce → Cloudflare D1 同期 完了 ($(date -u '+%Y-%m-%d %H:%M:%S') UTC)"
